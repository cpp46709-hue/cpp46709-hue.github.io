<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 这里是 CSS 样式，用来美化网页 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #0366d6; /* GitHub 蓝 */
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f; /* GitHub 绿 */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>你好，世界！👋</h1>
        <p>欢迎来到我的个人主页。这是我第一次使用 <strong>GitHub Pages</strong> 托管的网页！</p>
        <p>这段文字用来测试网页的展示效果。当你看到这个页面时，说明网页已经成功上线了。</p>
        <a href="https://github.com" target="_blank" class="btn">访问 GitHub</a>
    </div>

</body>
</html>
